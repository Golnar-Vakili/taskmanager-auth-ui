<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
                xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Meine Tasks – TaskManager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="navbar-brand">✅ TaskManager</div>
    <div class="navbar-user">
        <span sec:authentication="name"></span>
        <form th:action="@{/auth/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline btn-sm">Logout</button>
        </form>
    </div>
</nav>

<main class="container">

    <!-- Flash-Meldungen -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <!-- Neuen Task hinzufügen -->
    <section class="card create-card">
        <h2>Neuen Task erstellen</h2>
        <form th:action="@{/tasks/create}" th:object="${newTask}" method="post" class="create-form">
            <div class="form-row">
                <div class="form-group flex-grow">
                    <label>Titel *</label>
                    <input th:field="*{title}" type="text" placeholder="Was ist zu tun?" required/>
                </div>
                <div class="form-group">
                    <label>Priorität</label>
                    <select th:field="*{priority}">
                        <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fällig am</label>
                    <input th:field="*{dueDate}" type="date"/>
                </div>
            </div>
            <div class="form-group">
                <label>Beschreibung</label>
                <textarea th:field="*{description}" placeholder="Optionale Details..." rows="2"></textarea>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-primary">+ Task hinzufügen</button>
        </form>
    </section>

    <!-- Filter -->
    <div class="filter-bar">
        <a th:href="@{/tasks}" th:classappend="${activeFilter == 'ALL'} ? 'active'" class="filter-btn">Alle</a>
        <a th:href="@{/tasks(status='OPEN')}"        th:classappend="${activeFilter == 'OPEN'}        ? 'active'" class="filter-btn status-open">Offen</a>
        <a th:href="@{/tasks(status='IN_PROGRESS')}" th:classappend="${activeFilter == 'IN_PROGRESS'} ? 'active'" class="filter-btn status-progress">In Bearbeitung</a>
        <a th:href="@{/tasks(status='DONE')}"        th:classappend="${activeFilter == 'DONE'}        ? 'active'" class="filter-btn status-done">Erledigt</a>
    </div>

    <!-- Task-Liste -->
    <section class="task-list">
        <p th:if="${#lists.isEmpty(tasks)}" class="empty-state">
            🎉 Keine Tasks in dieser Kategorie. Erstelle einen neuen!
        </p>

        <div th:each="task : ${tasks}" class="task-card"
             th:classappend="${task.status.name()} == 'DONE' ? ' task-done' : ''">
            <div class="task-header">
                <div class="task-title-row">
                    <span class="priority-badge"
                          th:classappend="${task.priority.name() == 'HIGH'} ? ' priority-high' : (${task.priority.name() == 'LOW'} ? ' priority-low' : ' priority-medium')"
                          th:text="${task.priority}"></span>
                    <h3 th:text="${task.title}"></h3>
                </div>
                <span class="status-badge"
                      th:classappend="${'status-' + task.status.name().toLowerCase().replace('_','-')}"
                      th:text="${task.status}"></span>
            </div>

            <p th:if="${task.description}" class="task-description" th:text="${task.description}"></p>

            <div class="task-footer">
                <span th:if="${task.dueDate}" class="due-date">
                    📅 <span th:text="${#temporals.format(task.dueDate, 'dd.MM.yyyy')}"></span>
                </span>
                <div class="task-actions">
                    <a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-sm btn-outline">Bearbeiten</a>
                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" style="display:inline;"
                          onsubmit="return confirm('Task wirklich löschen?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-danger">Löschen</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

</main>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
