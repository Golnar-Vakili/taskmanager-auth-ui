<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
                xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Task bearbeiten – TaskManager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/tasks}">✅ TaskManager</a>
    <div class="navbar-user">
        <span sec:authentication="name"></span>
        <form th:action="@{/auth/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline btn-sm">Logout</button>
        </form>
    </div>
</nav>

<main class="container">
    <div class="card" style="max-width: 640px; margin: 2rem auto;">
        <h2>Task bearbeiten</h2>

        <form th:action="@{/tasks/{id}/edit(id=${task.id})}" th:object="${task}" method="post">
            <div class="form-group">
                <label>Titel *</label>
                <input th:field="*{title}" type="text" required/>
            </div>
            <div class="form-group">
                <label>Beschreibung</label>
                <textarea th:field="*{description}" rows="3"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Status</label>
                    <select th:field="*{status}">
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                th:selected="${task.status == s}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Priorität</label>
                    <select th:field="*{priority}">
                        <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"
                                th:selected="${task.priority == p}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fällig am</label>
                    <input th:field="*{dueDate}" type="date"/>
                </div>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-actions">
                <a th:href="@{/tasks}" class="btn btn-outline">Abbrechen</a>
                <button type="submit" class="btn btn-primary">Speichern</button>
            </div>
        </form>
    </div>
</main>

</body>
</html>
